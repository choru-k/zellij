          wix build wix\main.wxs wix\Zellij.wxl `
            -d Version=$version `
            -arch x64 `
            -ext WixToolset.UI.wixext `
            -o target\wix\zellij-no-web-${{ matrix.target }}-installer.msi

      - name: Create MSI checksum (no-web)
        if: runner.os == 'Windows'
        id: make-checksum-msi
        run: |
          $checksum_name = "zellij-no-web-${{ matrix.target }}-installer.sha256sum"
          $hash = (Get-FileHash "target\wix\zellij-no-web-${{ matrix.target }}-installer.msi" -Algorithm SHA256).Hash.ToLower()
          "$hash  zellij-no-web-${{ matrix.target }}-installer.msi" | Out-File -Encoding ascii $checksum_name
          echo "checksum_name=$checksum_name" >> $env:GITHUB_OUTPUT

      - name: Upload MSI installer (no-web)
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$env:RELEASE_TAG" "target\wix\zellij-no-web-${{ matrix.target }}-installer.msi" --repo "$env:GITHUB_REPOSITORY" --clobber

