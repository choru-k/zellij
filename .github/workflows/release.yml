name: Release
run-name: Release ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing tag to publish, for example v0.44.0-choru.1"
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  ensure-release:
    runs-on: ubuntu-latest
    steps:
      - name: Validate release tag
        run: |
          case "$RELEASE_TAG" in
            v[0-9]*.[0-9]*.[0-9]*|v[0-9]*.[0-9]*.[0-9]*-*) ;;
            *)
              echo "Unexpected release tag: $RELEASE_TAG"
              exit 1
              ;;
          esac

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists."
          else
            gh release create "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --title "Release $RELEASE_TAG" \
              --generate-notes
          fi

  build-release-normal:
    needs: ensure-release
    name: build-release-normal
    runs-on: ${{ matrix.os }}
    env:
      RUST_BACKTRACE: 1
    strategy:
      matrix:
        build:
          - linux musl x64
          - linux musl aarch64
          - macos x64
          - macos aarch64
          - windows x64
        include:
          - build: linux musl x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - build: linux musl aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-musl
          - build: macos x64
            os: macos-latest
            target: x86_64-apple-darwin
          - build: macos aarch64
            os: macos-latest
            target: aarch64-apple-darwin
          - build: windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Protoc
        uses: arduino/setup-protoc@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install musl-tools
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y --no-install-recommends musl-tools

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: "${{ matrix.target }},wasm32-wasip1"
          cache: false
          rustflags: ""

      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - name: Build release binary (cross-compiled)
        if: matrix.build != 'windows x64'
        run: cargo xtask ci cross ${{ matrix.target }}

      - name: Build release binary (Windows native)
        if: matrix.build == 'windows x64'
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: cargo xtask ci build-release

      - name: Create artifact (Unix)
        if: runner.os != 'Windows'
        id: make-artifact-unix
        run: |
          asset_name="zellij-${{ matrix.target }}.tar.gz"
          tar cvzf "${asset_name}" -C "target/${{ matrix.target }}/release" zellij
          echo "asset_name=${asset_name}" >> "$GITHUB_OUTPUT"

      - name: Create artifact (Windows)
        if: runner.os == 'Windows'
        id: make-artifact-windows
        run: |
          $asset_name = "zellij-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/release/zellij.exe" -DestinationPath $asset_name
          echo "asset_name=$asset_name" >> $env:GITHUB_OUTPUT

      - name: Create checksum (Unix)
        if: runner.os != 'Windows'
        id: make-checksum-unix
        run: |
          checksum_name="zellij-${{ matrix.target }}.sha256sum"
          if [[ "$RUNNER_OS" != "macOS" ]]; then
            sha256sum "target/${{ matrix.target }}/release/zellij" > "${checksum_name}"
          else
            shasum -a 256 "target/${{ matrix.target }}/release/zellij" > "${checksum_name}"
          fi
          echo "checksum_name=${checksum_name}" >> "$GITHUB_OUTPUT"

      - name: Create checksum (Windows)
        if: runner.os == 'Windows'
        id: make-checksum-windows
        run: |
          $checksum_name = "zellij-${{ matrix.target }}.sha256sum"
          $hash = (Get-FileHash "target/release/zellij.exe" -Algorithm SHA256).Hash.ToLower()
          "$hash  target/release/zellij.exe" | Out-File -Encoding ascii $checksum_name
          echo "checksum_name=$checksum_name" >> $env:GITHUB_OUTPUT

      - name: Upload release archive (Unix)
        if: runner.os != 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$RELEASE_TAG" "${{ steps.make-artifact-unix.outputs.asset_name }}" --repo "$GITHUB_REPOSITORY" --clobber

      - name: Upload release archive (Windows)
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$env:RELEASE_TAG" "${{ steps.make-artifact-windows.outputs.asset_name }}" --repo "$env:GITHUB_REPOSITORY" --clobber

      - name: Upload checksum (Unix)
        if: runner.os != 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$RELEASE_TAG" "${{ steps.make-checksum-unix.outputs.checksum_name }}" --repo "$GITHUB_REPOSITORY" --clobber

      - name: Upload checksum (Windows)
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$env:RELEASE_TAG" "${{ steps.make-checksum-windows.outputs.checksum_name }}" --repo "$env:GITHUB_REPOSITORY" --clobber

      - name: Install WiX v6
        if: runner.os == 'Windows'
        run: dotnet tool install --global wix

      - name: Add WiX UI extension
        if: runner.os == 'Windows'
        run: wix extension add WixToolset.UI.wixext/6.0.2

      - name: Build MSI installer
        if: runner.os == 'Windows'
        run: |
          $version = (Select-String -Path Cargo.toml -Pattern '^version\s*=\s*"(.+)"' | Select-Object -First 1).Matches.Groups[1].Value
          New-Item -ItemType Directory -Force -Path target\wix
          wix build wix\main.wxs wix\Zellij.wxl `
            -d Version=$version `
            -arch x64 `
            -ext WixToolset.UI.wixext `
            -o target\wix\zellij-${{ matrix.target }}-installer.msi

      - name: Create MSI checksum
        if: runner.os == 'Windows'
        id: make-checksum-msi
        run: |
          $checksum_name = "zellij-${{ matrix.target }}-installer.sha256sum"
          $hash = (Get-FileHash "target\wix\zellij-${{ matrix.target }}-installer.msi" -Algorithm SHA256).Hash.ToLower()
          "$hash  zellij-${{ matrix.target }}-installer.msi" | Out-File -Encoding ascii $checksum_name
          echo "checksum_name=$checksum_name" >> $env:GITHUB_OUTPUT

      - name: Upload MSI installer
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$env:RELEASE_TAG" "target\wix\zellij-${{ matrix.target }}-installer.msi" --repo "$env:GITHUB_REPOSITORY" --clobber

      - name: Upload MSI checksum
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$env:RELEASE_TAG" "${{ steps.make-checksum-msi.outputs.checksum_name }}" --repo "$env:GITHUB_REPOSITORY" --clobber

  build-release-noweb:
    needs: ensure-release
    name: build-release-noweb
    runs-on: ${{ matrix.os }}
    env:
      RUST_BACKTRACE: 1
    strategy:
      matrix:
        build:
          - linux musl x64
          - linux musl aarch64
          - macos x64
          - macos aarch64
          - windows x64
        include:
          - build: linux musl x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - build: linux musl aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-musl
          - build: macos x64
            os: macos-latest
            target: x86_64-apple-darwin
          - build: macos aarch64
            os: macos-latest
            target: aarch64-apple-darwin
          - build: windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Protoc
        uses: arduino/setup-protoc@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install musl-tools
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y --no-install-recommends musl-tools

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: "${{ matrix.target }},wasm32-wasip1"
          cache: false
          rustflags: ""

      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - name: Build release binary (cross-compiled, no-web)
        if: matrix.build != 'windows x64'
        run: cargo xtask ci cross ${{ matrix.target }} --no-web

      - name: Build release binary (Windows native, no-web)
        if: matrix.build == 'windows x64'
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: cargo xtask ci build-release --no-web

      - name: Create artifact (Unix)
        if: runner.os != 'Windows'
        id: make-artifact-unix
        run: |
          asset_name="zellij-no-web-${{ matrix.target }}.tar.gz"
          tar cvzf "${asset_name}" -C "target/${{ matrix.target }}/release" zellij
          echo "asset_name=${asset_name}" >> "$GITHUB_OUTPUT"

      - name: Create artifact (Windows)
        if: runner.os == 'Windows'
        id: make-artifact-windows
        run: |
          $asset_name = "zellij-no-web-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/release/zellij.exe" -DestinationPath $asset_name
          echo "asset_name=$asset_name" >> $env:GITHUB_OUTPUT

      - name: Create checksum (Unix)
        if: runner.os != 'Windows'
        id: make-checksum-unix
        run: |
          checksum_name="zellij-no-web-${{ matrix.target }}.sha256sum"
          if [[ "$RUNNER_OS" != "macOS" ]]; then
            sha256sum "target/${{ matrix.target }}/release/zellij" > "${checksum_name}"
          else
            shasum -a 256 "target/${{ matrix.target }}/release/zellij" > "${checksum_name}"
          fi
          echo "checksum_name=${checksum_name}" >> "$GITHUB_OUTPUT"

      - name: Create checksum (Windows)
        if: runner.os == 'Windows'
        id: make-checksum-windows
        run: |
          $checksum_name = "zellij-no-web-${{ matrix.target }}.sha256sum"
          $hash = (Get-FileHash "target/release/zellij.exe" -Algorithm SHA256).Hash.ToLower()
          "$hash  target/release/zellij.exe" | Out-File -Encoding ascii $checksum_name
          echo "checksum_name=$checksum_name" >> $env:GITHUB_OUTPUT

      - name: Upload release archive (Unix)
        if: runner.os != 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$RELEASE_TAG" "${{ steps.make-artifact-unix.outputs.asset_name }}" --repo "$GITHUB_REPOSITORY" --clobber

      - name: Upload release archive (Windows)
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$env:RELEASE_TAG" "${{ steps.make-artifact-windows.outputs.asset_name }}" --repo "$env:GITHUB_REPOSITORY" --clobber

      - name: Upload checksum (Unix)
        if: runner.os != 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$RELEASE_TAG" "${{ steps.make-checksum-unix.outputs.checksum_name }}" --repo "$GITHUB_REPOSITORY" --clobber

      - name: Upload checksum (Windows)
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$env:RELEASE_TAG" "${{ steps.make-checksum-windows.outputs.checksum_name }}" --repo "$env:GITHUB_REPOSITORY" --clobber

      - name: Install WiX v6
        if: runner.os == 'Windows'
        run: dotnet tool install --global wix

      - name: Add WiX UI extension
        if: runner.os == 'Windows'
        run: wix extension add WixToolset.UI.wixext/6.0.2

      - name: Build MSI installer (no-web)
        if: runner.os == 'Windows'
        run: |
          $version = (Select-String -Path Cargo.toml -Pattern '^version\s*=\s*"(.+)"' | Select-Object -First 1).Matches.Groups[1].Value
